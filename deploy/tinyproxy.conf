# Forward-proxy sidecar (2a egress decision, confirmed by Ronnie 2026-07-20):
# the poller has no route to the internet except through this proxy, and
# this proxy allows CONNECT only to the upstream gateway host (see
# tinyproxy.filter). Chosen over host-level nftables/ufw rules because it's
# expressible entirely in this committed compose stack, portable, and
# survives a host rebuild.

User tinyproxy
Group tinyproxy
Port 8888
Listen 0.0.0.0
Timeout 30
MaxClients 10

LogLevel Info

# HTTPS support: the client CONNECTs through us to the real TLS endpoint,
# we never see the decrypted traffic.
ConnectPort 443

Filter "/etc/tinyproxy/tinyproxy.filter"
FilterExtended On
FilterDefaultDeny Yes

DisableViaHeader Yes
